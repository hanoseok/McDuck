name: Snapshot

# Build McDuck and publish a snapshot (test) prerelease when a snapshot tag is
# pushed (tag-based snapshots). Snapshot tags are X.Y.Z-SNAPSHOT (e.g.
# `1.0.4-SNAPSHOT`), cut on a `develop` commit. Each build publishes:
#   - a pinned prerelease tagged like `1.0.4-SNAPSHOT`
#   - a moving `snapshot-latest` (re-pointed every build)
# so installs work via (GitHub has no `/snapshot/...` path):
#   git tag 1.0.4-SNAPSHOT && git push origin 1.0.4-SNAPSHOT
#   curl -fsSL https://github.com/hanoseok/McDuck/releases/download/snapshot-latest/install-snapshot.sh | bash
#   curl -fsSL https://github.com/hanoseok/McDuck/releases/download/1.0.4-SNAPSHOT/install-snapshot.sh | bash
#
# Being prereleases, snapshots never affect the official `releases/latest`
# produced from release tags (see release.yml).
on:
  push:
    tags:
      - "*-SNAPSHOT"
  workflow_dispatch:
    inputs:
      version:
        description: "Snapshot tag to build, e.g. 1.0.4-SNAPSHOT"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve snapshot version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Snapshot version: $VERSION"

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        run: swift test

      - name: Build app bundle
        env:
          MCDUCK_VERSION: ${{ steps.version.outputs.version }}
          MCDUCK_BUILD: ${{ github.run_number }}
        run: scripts/build-app.sh

      - name: Package app
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # --- .pkg installer (double-click -> macOS Installer GUI) ---
          PKGROOT="pkgroot"
          rm -rf "$PKGROOT"
          mkdir -p "$PKGROOT/Applications"
          cp -R dist/McDuck.app "$PKGROOT/Applications/McDuck.app"
          chmod +x scripts/pkg-scripts/postinstall
          PKG="McDuck-$VERSION.pkg"
          pkgbuild \
            --root "$PKGROOT" \
            --identifier io.github.hanoseok.McDuck \
            --version "$VERSION" \
            --install-location / \
            --scripts scripts/pkg-scripts \
            "$PKG"
          # Stable name for the moving snapshot-latest URL.
          cp "$PKG" "McDuck.pkg"

          # --- .zip (app + double-clickable installer script) ---
          STAGE="McDuck-$VERSION"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R dist/McDuck.app "$STAGE/McDuck.app"
          cp scripts/install.command "$STAGE/Install McDuck.command"
          chmod +x "$STAGE/Install McDuck.command"
          ARTIFACT="McDuck-$VERSION-macos.zip"
          ditto -c -k --sequesterRsrc --keepParent "$STAGE" "$ARTIFACT"

          CHECKSUMS="McDuck-$VERSION-checksums.sha256"
          shasum -a 256 "$PKG" "$ARTIFACT" > "$CHECKSUMS"

          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "checksums=$CHECKSUMS" >> "$GITHUB_OUTPUT"

      - name: Publish snapshot prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ASSETS=(
            "${{ steps.package.outputs.pkg }}"
            "McDuck.pkg"
            "${{ steps.package.outputs.artifact }}"
            "${{ steps.package.outputs.checksums }}"
            "scripts/install-snapshot.sh"
          )

          # Pinned, immutable snapshot release (tag already exists for a tag push;
          # --target creates it for a workflow_dispatch run).
          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            gh release create "$VERSION" "${ASSETS[@]}" \
              --title "McDuck $VERSION" \
              --target "$GITHUB_SHA" \
              --prerelease \
              --notes "Automated snapshot (test) build."
          fi

          # Moving snapshot-latest: re-point to this build.
          gh release delete snapshot-latest --yes --cleanup-tag || true
          for attempt in 1 2 3 4 5; do
            if gh release create snapshot-latest "${ASSETS[@]}" \
                 --title "McDuck snapshot (latest)" \
                 --target "$GITHUB_SHA" \
                 --prerelease \
                 --notes "Latest snapshot build: $VERSION"; then
              break
            fi
            echo "snapshot-latest create failed (attempt $attempt); retrying..."
            sleep 5
          done
