name: CI

# Runs the McDuckCore test suite on a macOS runner. The Linux cloud session
# can't build SwiftUI/macOS targets locally, so this workflow is how test
# changes are verified before a release. It does not publish anything.
on:
  push:
    branches:
      - "claude/brave-hamilton-YzkbK"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        run: swift test
