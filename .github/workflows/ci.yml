name: CI

# Runs the McDuckCore test suite on macOS runners. The Linux cloud session
# can't build SwiftUI/macOS targets locally, so this workflow is how test
# changes are verified. It does not publish anything.
#
# Runs on every pull request (into develop or main) so changes are verified
# before they merge; develop/main pushes are covered by snapshot.yml/release.yml.
#
# The suite must pass on both the minimum supported OS (macOS 15, per
# Package.swift's .macOS(.v15)) and the release OS (macOS 26), so both are
# exercised in a matrix.
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test
