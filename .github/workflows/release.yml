name: Release

# Build McDuck from `main` and publish it as the official GitHub Release for
# the current development line. The line is MAJOR.MINOR, held in RELEASE_VERSION
# (e.g. "1.0"). Every push to main (re)publishes a single moving release named
# `McDuck-<line>` (e.g. McDuck-1.0) — the one `releases/latest` points to.
#
# Versioning flow (paired with snapshot.yml on develop):
#   - develop publishes snapshots: 1.0.0-SNAPSHOT, 1.0.1-SNAPSHOT, ...
#   - merge to main -> official release McDuck-1.0
#   - to start the next cycle, bump RELEASE_VERSION's MINOR to "1.1": develop
#     then snapshots 1.1.0-SNAPSHOT..., and main releases McDuck-1.1.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release name to publish, e.g. McDuck-1.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.version }}"
          else
            # main push: release the current development line as McDuck-MAJOR.MINOR.
            LINE="$(tr -d '[:space:]' < RELEASE_VERSION)"; LINE="${LINE#v}"
            IFS=. read -r MAJ MIN REST <<< "$LINE"
            TAG="McDuck-${MAJ}.${MIN}"
          fi
          # Numeric version for stamping/pkgbuild: strip the McDuck-/v prefixes.
          SHORT="${TAG#McDuck-}"; SHORT="${SHORT#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "Resolved release: $TAG (version $SHORT)"

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        run: swift test

      - name: Build app bundle
        env:
          MCDUCK_VERSION: ${{ steps.version.outputs.short }}
          MCDUCK_BUILD: ${{ github.run_number }}
        run: scripts/build-app.sh

      - name: Package app
        id: package
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SHORT="${{ steps.version.outputs.short }}"

          # --- .pkg installer (double-click -> macOS Installer GUI) ---
          PKGROOT="pkgroot"
          rm -rf "$PKGROOT"
          mkdir -p "$PKGROOT/Applications"
          cp -R dist/McDuck.app "$PKGROOT/Applications/McDuck.app"
          chmod +x scripts/pkg-scripts/postinstall
          PKG="McDuck-$SHORT.pkg"
          pkgbuild \
            --root "$PKGROOT" \
            --identifier io.github.hanoseok.McDuck \
            --version "$SHORT" \
            --install-location / \
            --scripts scripts/pkg-scripts \
            "$PKG"
          # Stable, version-independent name so the installer can fetch it via
          # /releases/latest/download/McDuck.pkg without calling the GitHub API.
          cp "$PKG" "McDuck.pkg"

          # --- .zip (app + double-clickable installer script) ---
          STAGE="McDuck-$SHORT"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R dist/McDuck.app "$STAGE/McDuck.app"
          cp scripts/install.command "$STAGE/Install McDuck.command"
          chmod +x "$STAGE/Install McDuck.command"
          ARTIFACT="McDuck-$SHORT-macos.zip"
          # ditto preserves the macOS bundle structure and metadata.
          ditto -c -k --sequesterRsrc --keepParent "$STAGE" "$ARTIFACT"

          CHECKSUMS="McDuck-$SHORT-checksums.sha256"
          shasum -a 256 "$PKG" "$ARTIFACT" > "$CHECKSUMS"

          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "checksums=$CHECKSUMS" >> "$GITHUB_OUTPUT"

      - name: Publish official release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ASSETS=(
            "${{ steps.package.outputs.pkg }}"
            "McDuck.pkg"
            "${{ steps.package.outputs.artifact }}"
            "${{ steps.package.outputs.checksums }}"
            "scripts/install.sh"
          )
          # McDuck-<line> is a single moving release for the whole line: drop the
          # old release+tag and re-create it on this commit so it always reflects
          # the latest main build and stays `releases/latest` until the next
          # cycle (McDuck-1.1) begins.
          gh release delete "$TAG" --yes --cleanup-tag || true
          for attempt in 1 2 3 4 5; do
            if gh release create "$TAG" "${ASSETS[@]}" \
                 --title "$TAG" \
                 --target "$GITHUB_SHA" \
                 --generate-notes; then
              break
            fi
            echo "release create failed (attempt $attempt); retrying..."
            sleep 5
          done
