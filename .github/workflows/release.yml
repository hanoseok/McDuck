name: Release

# Build the McDuck app and publish it as a versioned GitHub Release.
# Push a tag like `v1.2.0`, or run manually with a version, to release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. v0.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: version
        run: |
          # Tag push uses the tag ref; manual dispatch uses the version input.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "short=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Build app bundle
        env:
          MCDUCK_VERSION: ${{ steps.version.outputs.short }}
          MCDUCK_BUILD: ${{ github.run_number }}
        run: scripts/build-app.sh

      - name: Package app
        id: package
        run: |
          ARTIFACT="McDuck-${{ steps.version.outputs.tag }}-macos.zip"
          # ditto preserves the macOS bundle structure and metadata.
          ditto -c -k --sequesterRsrc --keepParent dist/McDuck.app "$ARTIFACT"
          shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --target creates the tag on this commit when run manually;
          # for a tag push the tag already exists and --target is ignored.
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.package.outputs.artifact }}" \
            "${{ steps.package.outputs.artifact }}.sha256" \
            --title "McDuck ${{ steps.version.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --generate-notes
