name: Release

# Build McDuck and publish the official GitHub Release when a release tag is
# pushed (tag-based releases). Release tags are MAJOR.MINOR (e.g. `1.0`, `1.1`),
# cut on a `main` commit; the published release is named `McDuck-<tag>`
# (e.g. McDuck-1.0) and `releases/latest` points to the newest one.
#
#   git tag 1.0 && git push origin 1.0      # -> builds & publishes McDuck-1.0
#
# (Snapshots are a separate tag-based channel; see snapshot.yml.)
on:
  push:
    tags:
      - "[0-9]+.[0-9]+"          # 1.0, 1.1, 2.0, ...  (not X.Y.Z-SNAPSHOT)
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to build, e.g. 1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Numeric version for stamping/pkgbuild; the release is named McDuck-<short>.
          SHORT="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "Resolved release: McDuck-$SHORT (tag $TAG)"

      - name: Skip if release already exists
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.tag }} already exists; skipping."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Select latest Xcode
        if: steps.gate.outputs.release == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        if: steps.gate.outputs.release == 'true'
        run: swift test

      - name: Build app bundle
        if: steps.gate.outputs.release == 'true'
        env:
          MCDUCK_VERSION: ${{ steps.version.outputs.short }}
          MCDUCK_BUILD: ${{ github.run_number }}
        run: scripts/build-app.sh

      # The plugin's MCP server binary. Non-fatal: if it fails to build, the
      # release still publishes and the plugin launcher falls back to building
      # from source.
      - name: Build MCP server binary
        if: steps.gate.outputs.release == 'true'
        continue-on-error: true
        run: |
          swift build -c release --product mcduck-mcp
          cp .build/release/mcduck-mcp mcduck-mcp-macos

      - name: Package app
        if: steps.gate.outputs.release == 'true'
        id: package
        run: |
          SHORT="${{ steps.version.outputs.short }}"

          # --- .pkg installer (double-click -> macOS Installer GUI) ---
          PKGROOT="pkgroot"
          rm -rf "$PKGROOT"
          mkdir -p "$PKGROOT/Applications"
          cp -R dist/McDuck.app "$PKGROOT/Applications/McDuck.app"
          chmod +x scripts/pkg-scripts/postinstall
          PKG="McDuck-$SHORT.pkg"
          pkgbuild \
            --root "$PKGROOT" \
            --identifier io.github.hanoseok.McDuck \
            --version "$SHORT" \
            --install-location / \
            --scripts scripts/pkg-scripts \
            "$PKG"
          # Stable name so /releases/latest/download/McDuck.pkg always resolves.
          cp "$PKG" "McDuck.pkg"

          # --- .zip (app + double-clickable installer script) ---
          STAGE="McDuck-$SHORT"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R dist/McDuck.app "$STAGE/McDuck.app"
          cp scripts/install.command "$STAGE/Install McDuck.command"
          chmod +x "$STAGE/Install McDuck.command"
          ARTIFACT="McDuck-$SHORT-macos.zip"
          ditto -c -k --sequesterRsrc --keepParent "$STAGE" "$ARTIFACT"

          CHECKSUMS="McDuck-$SHORT-checksums.sha256"
          shasum -a 256 "$PKG" "$ARTIFACT" > "$CHECKSUMS"

          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "checksums=$CHECKSUMS" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The tag already exists for a tag push; --target creates it for a
          # workflow_dispatch run.
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.package.outputs.pkg }}" \
            "McDuck.pkg" \
            "${{ steps.package.outputs.artifact }}" \
            "${{ steps.package.outputs.checksums }}" \
            "scripts/install.sh" \
            --title "McDuck-${{ steps.version.outputs.short }}" \
            --target "${{ github.sha }}" \
            --generate-notes

          # Attach the plugin's MCP server binary if it built.
          if [ -f mcduck-mcp-macos ]; then
            gh release upload "${{ steps.version.outputs.tag }}" mcduck-mcp-macos --clobber
          fi
